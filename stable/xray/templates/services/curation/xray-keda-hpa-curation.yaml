{{- if and .Values.curation.separateRoute .Values.splitXraytoSeparateDeployments.fullSplit }}
{{- if and (.Values.curation.autoscaling.enabled) (eq .Values.curation.autoscaling.keda.enabled true) }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app: {{ template "xray.name" . }}
    chart: {{ template "xray.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
  name: {{ template "xray.fullname" . }}-curation
  {{- if or .Values.global.autoscaling.keda.annotations .Values.curation.autoscaling.keda.annotations }}
  annotations:
    {{- with .Values.global.autoscaling.keda.annotations }}
{{ toYaml . | indent 4 }}
    {{- end }}
    {{- with .Values.curation.autoscaling.keda.annotations }}
{{ toYaml . | indent 4 }}
    {{- end }}
  {{- end }}
spec:
  scaleTargetRef:
    kind: Deployment
    name: {{ template "xray.fullname" . }}-curation
  minReplicaCount: {{ .Values.curation.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.curation.autoscaling.maxReplicas }}
  pollingInterval: {{ .Values.curation.autoscaling.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.curation.autoscaling.keda.cooldownPeriod }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
        {{- .Values.curation.autoscaling.keda.scaleUp | toYaml | nindent 10 }}
        scaleDown:
        {{- .Values.curation.autoscaling.keda.scaleDown | toYaml | nindent 10 }}
  triggers:
  {{- include "xray.autoscalingQueuesCuration" . | indent 4 }}
    - type: cpu
      metricType: Utilization
      metadata:
        value: "{{ .Values.curation.autoscaling.targetCPUUtilizationPercentage }}"
    - type: memory
      metricType: Utilization
      metadata:
        value: "{{ .Values.curation.autoscaling.targetMemoryUtilizationPercentage }}"
{{- end }}
{{- end }}