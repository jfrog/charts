global:
  imageRegistry: docker.jfrog.io
  imagePullSecrets:
    - entplus

databaseUpgradeReady: true

artifactory:
  masterKey: 7d5cbd4dfbaf266d76a603bead1cf6987020ebf22f73f740c1486a498702d58e
  joinKey: 67aa87fbf0d7fdb3dc94bf5be6333e5eb8716f7b6151e2d4e4c80b7dec510780
  primary:
    replicaCount: 2
  persistence:
    enabled: false
  license:
    secret: rt-secret
    dataKey: artifactory.lic

postgresql:
  auth:
    password: "password"
  primary:
    persistence:
      enabled: false

access:
  enabled: true
  accessConfig:
    token: 
      allow-basic-auth: true

nginx: 
  enabled: true
  http:
    enabled: true
    externalPort: 8084
  https:
    enabled: true
    externalPort: 8089
  customPorts:
    - containerPort: 8085
      name: artv2
  service:
    customPorts:
      - port: 8085
        targetPort: 8080
        protocol: TCP
        name: artv2
  portInRedirect: "off"
  absoluteRedirect: "off"
