apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - command: helm upgrade --install rt ../../ --namespace ${NAMESPACE} -f customNginxConfigValues.yaml
  - command: kubectl rollout status statefulset/rt-artifactory-ha-primary -w -n ${NAMESPACE}
  - command: kubectl rollout status deployment/rt-nginx -w -n ${NAMESPACE}
timeout: 1200
