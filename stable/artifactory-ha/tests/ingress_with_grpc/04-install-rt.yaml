apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.1/standard-install.yaml 2>/dev/null || echo "Gateway API CRDs already available"
  - script: helm pull oci://ghcr.io/nginx/charts/nginx-gateway-fabric --version 2.4.2 2>/dev/null || true
  - script: helm upgrade --install nginx-gateway oci://ghcr.io/nginx/charts/nginx-gateway-fabric --version 2.4.2 --namespace nginx-gateway --create-namespace --set nginxGateway.snippetsFilters.enable=true 2>/dev/null || echo "NGINX Gateway Fabric already installed"
  - command: kubectl rollout status deployment/nginx-gateway-nginx-gateway-fabric -n nginx-gateway
  - command: ../../../../test/scripts/createEntplusSecret.sh
  - command: helm dep up ../..
  - command: helm upgrade --install rtgatewayapi ../../ --namespace ${NAMESPACE} -f customvalues.yaml -f gatewayApiValues.yaml
  - command: kubectl rollout status statefulset/rtgatewayapi-artifactory-ha-primary -w -n ${NAMESPACE}
timeout: 1200