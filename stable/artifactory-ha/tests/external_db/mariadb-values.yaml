global:
  imageRegistry: docker.jfrog.io
  imagePullSecrets:
    - entplus

postgresql:
  enabled: false

waitForDatabase: true

database:
  allowNonPostgresql: true
  type: mariadb
  driver: org.mariadb.jdbc.Driver
  url: jdbc:mariadb://mariadb:3306/artifactory?characterEncoding=UTF-8&elideSetAutoCommits=true&useSSL=false&useMysqlMetadata=true
  user: artifactory
  password: password

shared:
  database:
    allowNonPostgresql: true
    
artifactory:
  preStartCommand: "mkdir -p /opt/jfrog/artifactory/var/bootstrap/artifactory/tomcat/lib; cd /opt/jfrog/artifactory/var/bootstrap/artifactory/tomcat/lib && curl -L -o mariadb-jdbc.jar https://repo1.maven.org/maven2/org/mariadb/jdbc/mariadb-java-client/3.3.0/mariadb-java-client-3.3.0.jar"
  masterKey: 7d5cbd4dfbaf266d76a603bead1cf6987020ebf22f73f740c1486a498702d58e
  joinKey: 67aa87fbf0d7fdb3dc94bf5be6333e5eb8716f7b6151e2d4e4c80b7dec510780
  primary:
    replicaCount: 2