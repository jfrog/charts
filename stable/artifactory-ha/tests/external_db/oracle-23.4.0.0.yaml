apiVersion: v1
kind: Service
metadata:
  name: db19c-oracle-db23c-free  
  labels:
    app: db19c-oracle-db23c-free
    chart: oracle-db23c-free-1.0.0
    release: db19c
    heritage: Helm
spec:
  type: ClusterIP
  ports:
  - name: listener
    port: 1521
    protocol: TCP
  - name: xmldb
    port: 5500
    protocol: TCP
  selector:
    app: db19c-oracle-db23c-free
---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db19c-oracle-db23c-free  
  labels:
    app: db19c-oracle-db23c-free
    chart: oracle-db23c-free-1.0.0
    release: db19c
    heritage: Helm
spec:
  replicas: 1
  # strategy:
  #   rollingUpdate:
  #     maxSurge: 100
  #     maxUnavailable: 100
  #   type: RollingUpdate
  selector:
    matchLabels:
      app: db19c-oracle-db23c-free
  template:
    metadata:
      labels:
        app: db19c-oracle-db23c-free
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 54321
        fsGroup: 54321
      containers:
        - name: oracle-db
          image: container-registry.oracle.com/database/free:23.4.0.0
          imagePullPolicy: "Always"
          ports:
            - containerPort: 1521
            - containerPort: 5500
          readinessProbe:
            exec:
              command: [ "/bin/sh", "-c", "if [ -f $ORACLE_BASE/checkDBLockStatus.sh ]; then $ORACLE_BASE/checkDBLockStatus.sh ; else $ORACLE_BASE/checkDBStatus.sh; fi " ]
            initialDelaySeconds: 40
            periodSeconds: 40
            timeoutSeconds: 20          
          env:
            - name: SVC_HOST
              value: "db19c-oracle-db23c-free"
            - name: SVC_PORT
              value: "1521"
            - name: ORACLE_SID
              value: "FREE"
            - name: ORACLE_PDB
              value: "FREEPDB1"
            - name: ORACLE_PWD
              value: "password"
            - name: ORACLE_CHARACTERSET
              value: "AL32UTF8"
            - name: ORACLE_EDITION
              value: "standard"
            - name: ENABLE_ARCHIVELOG
              value: "false"
        - name: db19c-connection-test
          image: container-registry.oracle.com/database/free:23.4.0.0    
          env:
            - name: SVC_HOST
              value: "localhost"
            - name: SVC_PORT
              value: "1521"
            - name: ORACLE_SID
              value: "FREE"
            - name: ORACLE_PDB
              value: "FREEPDB1"
            - name: ORACLE_PWD
              value: "password"
            - name: ORACLE_CHARACTERSET
              value: "AL32UTF8"
            - name: ORACLE_EDITION
              value: "standard"
            - name: ENABLE_ARCHIVELOG
              value: "false"
          command:
          - /bin/bash
          - -c
          - |
            echo "Waiting for SQL Server to be available..."
            while true; do
              query_status=$(echo "SELECT 'Database Status: ' || status FROM v\$instance;" | sqlplus -S sys/$ORACLE_PWD@//$SVC_HOST:$SVC_PORT/$ORACLE_SID as sysdba)
              status=$(echo "$query_status" | grep -v 'STATUS' |  awk '/Database Status:/ {print $NF}')
              if echo "$status" | grep -q "OPEN"; then
                echo "db is up"
                break
              else
                echo "db is not up, checking again..."
                sleep 5
              fi
            done

            echo "Running SQL file..."
            sqlplus -S sys/$ORACLE_PWD@//$SVC_HOST:$SVC_PORT/$ORACLE_SID as sysdba <<EOF

            CREATE PLUGGABLE DATABASE artifactorypdb
            ADMIN USER artifactory_admin IDENTIFIED BY YourStrongPassword
            FILE_NAME_CONVERT = ('/opt/oracle/oradata/FREE/', '/opt/oracle/oradata/ARTIFACTORYPDB/');

            -- Open the pluggable database
            ALTER PLUGGABLE DATABASE artifactorypdb OPEN;

            -- Switch to the new pluggable database
            ALTER SESSION SET CONTAINER=artifactorypdb;

            -- Create the user and grant privileges
            CREATE USER artifactoryuser IDENTIFIED BY password;
            GRANT CONNECT, RESOURCE TO artifactoryuser;
            GRANT DBA TO artifactoryuser;

            EXIT;
            EOF
            tail -f /dev/null
---