global:
  imageRegistry: docker.jfrog.io
  imagePullSecrets:
    - entplus

databaseUpgradeReady: true

postgresql:
  auth:
    password: "password"

artifactory:
  migration:
    enabled: false
  masterKey: FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF
  database:
    maxOpenConnections: 100
  tomcat:
    connector:
      maxThreads: 200
  primary:
    replicaCount: 2
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "8Gi"
        cpu: "6"
    javaOpts:
      xms: "6g"
      xmx: "8g"

  service:
    ipFamilyPolicy: "PreferDualStack"
    ipFamilies:
    - IPv4

access:
  database:
    maxOpenConnections: 100
  tomcat:
    connector:
      maxThreads: 50
router:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
frontend:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
metadata:
  database:
    maxOpenConnections: 100
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
event:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
jfconnect:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
integration:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
observability:
  resources:
    requests:
      memory: "200Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"

nginx:
  service:
    ipFamilyPolicy: "PreferDualStack"
    ipFamilies:
    - IPv4