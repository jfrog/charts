
databaseUpgradeReady: true
postgresql:
  auth:
    password: "password"
  primary:
    persistence:
      enabled: false

rbac:
  create: true
serviceAccount:
  create: true
  automountServiceAccountToken: true

artifactory:
  migration:
    enabled: false
  metrics:
    enabled: true
  podSecurityContext:
    fsGroupChangePolicy: "OnRootMismatch"
  masterKey: FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF
  unifiedSecretInstallation: false
  persistence:
    enabled: false
  primary:
    replicaCount: 2
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "6Gi"
        cpu: "4"
    javaOpts:
      xms: "4g"
      xmx: "4g"
  statefulset:
    annotations:
      artifactory: test
  customInitContainersBegin: |
   - name: "custom-init-begin-local"
     image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
     imagePullPolicy: {{ .Values.initContainers.image.pullPolicy }}
     command:
       - 'sh'
       - '-c'
       - echo "running in local"
     volumeMounts:
       - mountPath: "{{ .Values.artifactory.persistence.mountPath }}"
         name: volume
  customInitContainers: |
   - name: "custom-init-local"
     image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
     imagePullPolicy: {{ .Values.initContainers.image.pullPolicy }}
     command:
       - 'sh'
       - '-c'
       - echo "running in local"
     volumeMounts:
       - mountPath: "{{ .Values.artifactory.persistence.mountPath }}"
         name: volume
  # Add custom volumes
  customVolumes: |
   - name: custom-script-local
     emptyDir:
       sizeLimit: 100Mi
  # Add custom volumesMounts
  customVolumeMounts: |
   - name: custom-script-local
     mountPath: "/scriptslocal"
  # Add custom sidecar containers
  customSidecarContainers: |
   - name: "sidecar-list-local"
     image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
     imagePullPolicy: {{ .Values.initContainers.image.pullPolicy }}
     securityContext:
       allowPrivilegeEscalation: false
       capabilities:
         drop:
           - NET_RAW
     command: ["sh","-c","echo 'Sidecar is running in local' >> /scriptslocal/sidecarlocal.txt; cat /scriptslocal/sidecarlocal.txt; while true; do sleep 30; done"]
     volumeMounts:
       - mountPath: "/scriptslocal"
         name: custom-script-local
     resources:
       requests:
         memory: "32Mi"
         cpu: "50m"
       limits:
         memory: "128Mi"
         cpu: "100m"

global:
