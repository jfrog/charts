apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  # Dedicated RTFS DB via secrets
  - command: helm upgrade rt ../../ --namespace ${NAMESPACE} -f customvalues-02-dedicated-secrets.yaml
  - command: kubectl rollout status statefulset/rt-artifactory-ha-primary -w -n ${NAMESPACE}
  - command: kubectl rollout status deployment/rt-artifactory-ha-rtfs -w -n ${NAMESPACE}
timeout: 600
