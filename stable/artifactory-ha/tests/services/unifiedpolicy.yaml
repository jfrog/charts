global:
  imageRegistry: docker.jfrog.io
  imagePullSecrets:
    - entplus

databaseUpgradeReady: true

databaseUpgradeReady: true

## This is an exception here because HA needs masterKey to connect with other node members and it is commented in values to support 6.x to 7.x Migration
## Please refer https://github.com/jfrog/charts/blob/master/stable/artifactory-ha/README.md#special-upgrade-notes-1
artifactory:
  masterKey: 7d5cbd4dfbaf266d76a603bead1cf6987020ebf22f73f740c1486a498702d58e
  joinKey: 67aa87fbf0d7fdb3dc94bf5be6333e5eb8716f7b6151e2d4e4c80b7dec510780
  primary:
    replicaCount: 2
  persistence:
    enabled: false    

postgresql:
  auth:
    password: "password"
  primary:
    persistence:
      enabled: false

unifiedpolicy:
  enabled: true
  customInitContainers: |
    - name: "custom-systemyaml-setup"
      image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
      imagePullPolicy: {{ .Values.initContainers.image.pullPolicy }}
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - NET_RAW
      command:
        - 'sh'
        - '-c'
        - 'echo 1234'
  customSidecarContainers: |

  customVolumes: |
    - name: custom-secret
      emptyDir: {}
  ## Add custom volumesMounts
  customVolumeMounts: |
    - name: custom-secret
      mountPath: "custom.sh"

  ## Apply horizontal pod auto scaling on distribution pods
  ## Ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    metrics: |
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 70  # Target memory usage is 75% of the allocated memory per pod
