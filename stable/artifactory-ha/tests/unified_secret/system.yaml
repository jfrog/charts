router:
  serviceRegistry:
    insecure: false
shared:
  logging:
    consoleLog:
      enabled: false
  extraJavaOpts: >
    -Dartifactory.graceful.shutdown.max.request.duration.millis=30000
    -Dartifactory.access.client.max.connections=50
    -Dartifactory.rtfs.auto.migration.enabled=false
  database:
    type: postgresql
    url: "jdbc:postgresql://rt-postgresql:5432/artifactory"
    host: ""
    driver: org.postgresql.Driver
    username: "artifactory"
artifactory:
  database:
    maxOpenConnections: 80
  tomcat:
    maintenanceConnector:
      port: 8091
      host: "0.0.0.0"
    connector:
      maxThreads: 200
      sendReasonPhrase: false
      extraConfig: acceptCount="400"
frontend:
  session:
    timeMinutes: "30"
access:
  database:
    maxOpenConnections: 80
  tomcat:
    connector:
      maxThreads: 50
      sendReasonPhrase: false
      extraConfig: acceptCount="100"
metadata:
  database:
    maxOpenConnections: 80
jfconnect:
  enabled: true