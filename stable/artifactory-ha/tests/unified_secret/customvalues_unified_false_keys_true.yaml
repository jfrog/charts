global:
  masterKeySecretName: keys
  joinKeySecretName: keys
  imageRegistry: docker.jfrog.io
  imagePullSecrets:
    - entplus

systemYamlOverride:
  existingSecret: rt-secret
  dataKey: system.yaml

databaseUpgradeReady: true
## This is an exception here because HA needs masterKey to connect with other node members and it is commented in values to support 6.x to 7.x Migration
## Please refer https://github.com/jfrog/charts/blob/master/stable/artifactory-ha/README.md#special-upgrade-notes-1
artifactory:
  persistence:
    customBinarystoreXmlSecret: rt-secret
  license:
    licenseKey: |
      

      

  primary:
    replicaCount: 1
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "6Gi"
        cpu: "4"
    javaOpts:
      xms: "4g"
      xmx: "4g"
  # certificates added to this secret will be copied to $JFROG_HOME/artifactory/var/etc/security/keys/trusted directory
  customCertificates:
    enabled: true
    certificateSecretName: cert-secret


postgresql:
  auth:
    password: "password"
frontend:
  asPod: false

rtfs:
  enabled: true

jfbus:
  enabled: true

unifiedpolicy:
  enabled: true

platformfederation:
  enabled: true