apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: artifactory
    release: test
    role: artifactory
  name: volume-rtt-artifactory-ha-primary-0
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: gp2
  volumeMode: Filesystem
