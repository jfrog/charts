{{- if and .Values.frontend.enabled .Values.frontend.asPod }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    app: {{ template "artifactory-ha.name" . }}
    chart: {{ template "artifactory-ha.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    component: {{ .Values.frontend.name }}
{{- if .Values.frontend.deployment.labels }}
{{ toYaml .Values.frontend.deployment.labels | indent 4 }}
{{- end }}
{{- with .Values.frontend.deployment.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: {{ .Values.frontend.updateStrategy.type }}
  selector:
    matchLabels:
      app: {{ template "artifactory-ha.name" . }}
      release: {{ .Release.Name }}
      component: {{ .Values.frontend.name }}
  template:
    metadata:
      annotations:
      {{- if not .Values.artifactory.unifiedSecretInstallation }}
        checksum/systemyaml: {{ include (print $.Template.BasePath "/artifactory-system-yaml.yaml") . | sha256sum }}
      {{- else }}
        checksum/artifactory-unified-secret: {{ include (print $.Template.BasePath "/artifactory-unified-secret.yaml") . | sha256sum }}
      {{- end }}
      labels:
        app: {{ template "artifactory-ha.name" . }}
        chart: {{ template "artifactory-ha.chart" . }}
        component: {{ .Values.frontend.name }}
        heritage: {{ .Release.Service }}
        release: {{ .Release.Name }}
    spec:
      {{- if or .Values.imagePullSecrets .Values.global.imagePullSecrets }}
{{- include "artifactory-ha.imagePullSecrets" . | indent 6 }}
      {{- end }}
      {{- if .Values.frontend.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.frontend.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.serviceAccountName }}
      serviceAccountName: {{ .Values.frontend.serviceAccountName }}
      {{- end}}
      {{- if .Values.frontend.schedulerName }}
      schedulerName: {{ .Values.frontend.schedulerName | quote }}
      {{- end }}
      {{- if .Values.frontend.topologySpreadConstraints }}
      topologySpreadConstraints:
{{ tpl (toYaml .Values.frontend.topologySpreadConstraints) . | indent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.frontend.customInitContainers }}
{{ tpl (include "artifactory.frontend.customInitContainers" .)  . | indent 8 }}
        {{- end }}
        - name: 'copy-system-yaml'
          image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
          imagePullPolicy: {{ .Values.initContainers.image.pullPolicy | quote }}
          {{- if .Values.frontend.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.frontend.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.initContainers.resources }}
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
          {{- end }}
          command:
            - '/bin/bash'
            - '-c'
            - >
              echo "Copy system.yaml to {{ .Values.frontend.persistence.mountPath }}/etc";
              mkdir -p {{ .Values.frontend.persistence.mountPath }}/etc;
              mkdir -p {{ .Values.frontend.persistence.mountPath }}/etc/access/keys/trusted;
              {{- if .Values.systemYamlOverride.existingSecret }}
              cp -fv /tmp/etc/{{ .Values.systemYamlOverride.dataKey }} {{ .Values.frontend.persistence.mountPath }}/etc/system.yaml;
              {{- else }}
              cp -fv /tmp/etc/system.yaml {{ .Values.frontend.persistence.mountPath }}/etc/system.yaml;
              {{- end }}
          {{- if or .Values.artifactory.joinKey .Values.global.joinKey .Values.artifactory.joinKeySecretName .Values.global.joinKeySecretName }}
              echo "Copy joinKey to {{ .Values.frontend.persistence.mountPath }}/etc/security";
              mkdir -p {{ .Values.frontend.persistence.mountPath }}/etc/security;
              echo -n ${ARTIFACTORY_JOIN_KEY} > {{ .Values.frontend.persistence.mountPath }}/etc/security/join.key;
          {{- end }}
          {{- if or .Values.artifactory.masterKey .Values.global.masterKey .Values.artifactory.masterKeySecretName .Values.global.masterKeySecretName }}
              echo "Copy masterKey to {{ .Values.frontend.persistence.mountPath }}/etc/security";
              mkdir -p {{ .Values.frontend.persistence.mountPath }}/etc/security;
              echo -n ${ARTIFACTORY_MASTER_KEY} > {{ .Values.frontend.persistence.mountPath }}/etc/security/master.key;
          {{- end }}
              echo "system yaml and keys copy completed.";
          env:
          {{- if or .Values.artifactory.joinKey .Values.global.joinKey .Values.artifactory.joinKeySecretName .Values.global.joinKeySecretName }}
          - name: ARTIFACTORY_JOIN_KEY
            valueFrom:
              secretKeyRef:
              {{- if or (not .Values.artifactory.unifiedSecretInstallation) .Values.artifactory.joinKeySecretName .Values.global.joinKeySecretName }}
                name: {{ include "artifactory-ha.joinKeySecretName" . }}
              {{- else }}
                name: "{{ template "artifactory.unifiedSecretPrependReleaseName" . }}-unified-secret"
              {{- end }}
                key: join-key
          {{- end }}
          {{- if or .Values.artifactory.masterKey .Values.global.masterKey .Values.artifactory.masterKeySecretName .Values.global.masterKeySecretName }}
          - name: ARTIFACTORY_MASTER_KEY
            valueFrom:
              secretKeyRef:
                {{- if or (not .Values.artifactory.unifiedSecretInstallation) .Values.artifactory.masterKeySecretName .Values.global.masterKeySecretName }}
                name: {{ include "artifactory-ha.masterKeySecretName" . }}
                {{- else }}
                name: "{{ template "artifactory.unifiedSecretPrependReleaseName" . }}-unified-secret"
                {{- end }}
                key: master-key
          {{- end }}
          volumeMounts:
            # volume mounts for init container
            - name: data
              mountPath: {{ .Values.frontend.persistence.mountPath | quote }}
            {{- if or (not .Values.artifactory.unifiedSecretInstallation) .Values.systemYamlOverride.existingSecret }}
            - name: systemyaml
            {{- else }}
            - name: {{ include "artifactory-ha.unifiedCustomSecretVolumeName" . }}
            {{- end }}
              {{- if .Values.systemYamlOverride.existingSecret }}
              mountPath: "/tmp/etc/{{.Values.systemYamlOverride.dataKey }}"
              subPath: {{ .Values.systemYamlOverride.dataKey }}
              {{- else  }}
              mountPath: "/tmp/etc/system.yaml"
              subPath: "system.yaml"
              {{- end }}
        {{- if .Values.frontend.waitForArtifactory }}
        - name: wait-for-artifactory
          image: {{ include "artifactory-ha.getImageInfoByValue" (list . "initContainers") }}
          imagePullPolicy: {{ .Values.initContainers.image.pullPolicy | quote }}
          {{- if .Values.frontend.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.frontend.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.initContainers.resources }}
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
          {{- end }}
          command:
          - /bin/sh
          - -c
          - |
            echo "Waiting for Artifactory service to be ready..."
            ready=false;
            while ! $ready; do echo waiting;
              curl -k --silent --output /dev/null --max-time 3 --fail "{{ tpl (include "artifactory-ha.jfrogUrl" .) . }}/artifactory/api/v1/system/readiness"; exit_status=$?;
              if [[ $exit_status -eq 0 ]]; then ready=true; echo "Artifactory is ready. Proceeding..."; fi; sleep 1;
            done
        {{- end }}
      containers:
        {{- if .Values.observability.enabled }}
        - name: {{ .Values.observability.name }}
          image: {{ include "artifactory-ha.getImageInfoByValue" (list . "observability") }}
          imagePullPolicy: {{ .Values.observability.image.pullPolicy }}
          {{- if .Values.observability.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.observability.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- with .Values.observability.lifecycle }}
          lifecycle:
{{ toYaml . | indent 12 }}
          {{- end }}
          env:
          - name: JF_SHARED_PLATFORMSERVICES_ENABLED
            value: "true"
{{- with .Values.observability.extraEnvironmentVariables }}
{{ tpl (toYaml .) $ | indent 10 }}
{{- end }}
          volumeMounts:
          - name: data
            mountPath: {{ .Values.observability.persistence.mountPath | quote }}
{{- with .Values.observability.customVolumeMounts }}
{{ tpl . $ | indent 10 }}
{{- end }}
          resources:
{{ toYaml .Values.observability.resources | indent 12 }}
          {{- if .Values.observability.startupProbe.enabled }}
          startupProbe:
{{ tpl .Values.observability.startupProbe.config . | indent 12 }}
          {{- end }}
          {{- if .Values.observability.livenessProbe.enabled }}
          livenessProbe:
{{ tpl .Values.observability.livenessProbe.config . | indent 12 }}
          {{- end }}
      {{- end }}
        - name: {{ .Values.frontend.name }}
          image: {{ include "artifactory-ha.getImageInfoByValue" (list . "frontend") }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        {{- if .Values.frontend.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.frontend.containerSecurityContext "enabled" | toYaml | nindent 12 }}
        {{- end }}
          {{- with .Values.frontend.lifecycle }}
          lifecycle:
{{ toYaml . | indent 12 }}
          {{- end }}
          env:
           ## Warning: This JF_FRONTEND_LISTENADDR env is for probe, you may remove this if not needed.
          - name: JF_FRONTEND_LISTENADDR
            value: "0.0.0.0"
          - name: JF_SHARED_NODE_ID
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          {{- if (gt (.Values.artifactory.primary.replicaCount | int64) 1) }}
          - name : JF_SHARED_NODE_HAENABLED
            value: "true"
          {{- end }}
  {{- with .Values.frontend.extraEnvironmentVariables }}
{{ tpl (toYaml .) $ | indent 10 }}
  {{- end }}
          volumeMounts:
          {{- if .Values.frontend.customVolumeMounts }}
{{ tpl (include "artifactory.frontend.customVolumeMounts" .) . | indent 10 }}
          {{- end }}
          - name: data
            mountPath: {{ .Values.frontend.persistence.mountPath | quote }}
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
        {{- if .Values.frontend.startupProbe.enabled }}
          startupProbe:
{{ tpl .Values.frontend.startupProbe.config . | indent 12 }}
        {{- end }}
        {{- if .Values.frontend.livenessProbe.enabled }}
          livenessProbe:
{{ tpl .Values.frontend.livenessProbe.config . | indent 12 }}
        {{- end }}
        {{- if .Values.frontend.readinessProbe.enabled }}
          readinessProbe:
{{ tpl .Values.frontend.readinessProbe.config . | indent 12 }}
        {{- end }}
        - name: {{ .Values.router.name }}
          image: {{ include "artifactory-ha.getImageInfoByValue" (list . "router") }}
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          resources: {{- toYaml .Values.router.resources | nindent 12 }}
          {{- if .Values.router.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.router.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          command:
            - '/bin/bash'
            - '-c'
            - >
              exec /opt/jfrog/router/app/bin/entrypoint-router.sh
          env:
            - name: JF_ROUTER_TOPOLOGY_LOCAL_REQUIREDSERVICETYPES
              value: {{ .Values.frontend.serviceID }}
            - name: JF_SHARED_NODE_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: JF_SHARED_JFROGURL
              value: {{ tpl (include "artifactory-ha.jfrogUrl" .) . }}
            {{- if or .Values.artifactory.masterKey .Values.global.masterKey .Values.artifactory.masterKeySecretName .Values.global.masterKeySecretName }}
            - name: JF_SHARED_SECURITY_MASTERKEY
              valueFrom:
                secretKeyRef:
                {{- if or (not .Values.artifactory.unifiedSecretInstallation) .Values.artifactory.masterKeySecretName .Values.global.masterKeySecretName }}
                  name: {{ include "artifactory-ha.masterKeySecretName" . }}
                {{- else }}
                  name: "{{ template "artifactory.unifiedSecretPrependReleaseName" . }}-unified-secret"
                {{- end }}
                  key: master-key
            {{- end }}
            {{- if or .Values.artifactory.joinKey .Values.global.joinKey .Values.artifactory.joinKeySecretName .Values.global.joinKeySecretName }}
            - name: JF_SHARED_SECURITY_JOINKEY
              valueFrom:
                secretKeyRef:
                {{- if or (not .Values.artifactory.unifiedSecretInstallation) .Values.artifactory.joinKeySecretName .Values.global.joinKeySecretName }}
                  name: {{ include "artifactory-ha.joinKeySecretName" . }}
                {{- else }}
                  name: "{{ template "artifactory.unifiedSecretPrependReleaseName" . }}-unified-secret"
                {{- end }}
                  key: join-key
            {{- end }}
{{- with .Values.router.extraEnvironmentVariables }}
{{ tpl (toYaml .) $ | indent 12 }}
{{- end }}
          ports:
            - name: http-router
              containerPort: {{ .Values.router.internalPort }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.router.persistence.mountPath | quote }}
{{- with .Values.router.customVolumeMounts }}
{{ tpl . $ | indent 12 }}
{{- end }}
            {{- if .Values.router.startupProbe.enabled }}
          startupProbe:
{{ tpl .Values.router.startupProbe.config . | indent 12 }}
            {{- end }}
            {{- if .Values.router.readinessProbe.enabled }}
          readinessProbe:
{{ tpl .Values.router.readinessProbe.config . | indent 12 }}
            {{- end }}
            {{- if .Values.router.livenessProbe.enabled }}
          livenessProbe:
{{ tpl .Values.router.livenessProbe.config . | indent 12 }}
            {{- end }}
            {{- with .Values.router.lifecycle }}
          lifecycle:
{{ toYaml . | indent 12 }}
            {{- end }}
        {{- if .Values.frontend.customSidecarContainers }}
{{ tpl (include "artifactory.frontend.customSidecarContainers" .)  . | indent 8 }}
        {{- end }}

      volumes:
        # external system yaml secret
        {{- if .Values.systemYamlOverride.existingSecret }}
        - name: systemyaml
          secret:
            secretName: {{ .Values.systemYamlOverride.existingSecret }}
        {{- end }}
        # data volume
        - name: data
          emptyDir: {}

        #########  unifiedSecretInstallation ###########
      {{- if and .Values.artifactory.unifiedSecretInstallation (eq (include "artifactory-ha.frontend.checkDuplicateUnifiedCustomVolume" .) "false" ) }}
        - name: {{ include "artifactory-ha.unifiedCustomSecretVolumeName" . }}
          secret:
            secretName: "{{ template "artifactory.unifiedSecretPrependReleaseName" . }}-unified-secret"
      {{- else if not .Values.artifactory.unifiedSecretInstallation }}
        {{- if not .Values.systemYamlOverride.existingSecret }}
        - name: systemyaml
          secret:
            secretName: {{ printf "%s-%s" (include "artifactory-ha.fullname" .) "systemyaml" }}
        {{- end }}
      {{- end }}
        ######### end unifiedSecretInstallation ###########
        {{- if .Values.frontend.customVolumes }}
{{ tpl (include "artifactory.frontend.customVolumes" .)  . | indent 8 }}
        {{- end }}
        {{- if .Values.observability.customVolumes }}
{{ tpl (include "artifactory-ha.observability.customVolumes" .)  . | indent 8 }}
        {{- end }}
        {{- if .Values.router.customVolumes }}
{{ tpl (include "artifactory-ha.router.customVolumes" .)  . | indent 8 }}
        {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
