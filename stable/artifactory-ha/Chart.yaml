apiVersion: v2
kubeVersion: ">= 1.21.0-0"
type: application
name: artifactory-ha
home: https://www.jfrog.com/artifactory/
version: 107.147.0
appVersion: 7.139.4
dependencies:
  - name: postgresql
    version: 16.7.26
    repository: https://charts.jfrog.io/
    condition: postgresql.enabled
description: Universal Repository Manager supporting all major packaging formats, build tools and CI servers.
keywords:
- artifactory
- jfrog
- devops
sources:
- https://github.com/jfrog/charts
maintainers:
- name: Chart Maintainers at JFrog
  email: installers@jfrog.com
icon: https://raw.githubusercontent.com/jfrog/charts/master/stable/artifactory-ha/logo/artifactory-logo.png
annotations:
  artifactoryServiceVersion: _ARTIFACTORY_SERVICE_VERSION_
  metadataVersion: _METADATA_VERSION_
  observabilityVersion: _OBSERVABILITY_VERSION_
